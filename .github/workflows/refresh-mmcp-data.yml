name: Refresh MMCP public data

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Refresh data
        run: npm run refresh:data

      - name: Get refresh date
        id: date
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automated/mmcp-data-refresh
          delete-branch: true
          title: Refresh MMCP public data - ${{ steps.date.outputs.date }}
          commit-message: Refresh MMCP public data
          body: |
            Automated refresh of public MMCP source data.

            Validation command:

            ```bash
            npm run refresh:data
            ```
